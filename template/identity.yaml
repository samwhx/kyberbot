# KyberBot Identity Configuration
# Machine config — paths, ports, service settings
# The agent can update heartbeat_interval via natural language

agent_name: "KyberBot"
agent_description: "Your personal AI agent"

# Your timezone (IANA format)
timezone: "America/New_York"

# Heartbeat interval — how often the agent checks HEARTBEAT.md
# Duration string: "5m", "30m", "1h", "2h"
heartbeat_interval: "30m"

# Optional: restrict heartbeats to specific hours
# heartbeat_active_hours:
#   start: "07:00"
#   end: "23:00"
#   timezone: "America/New_York"

# Server configuration
server:
  port: 3456

# Claude mode
claude:
  mode: "subscription"  # "subscription" or "sdk"
  model: "opus"         # haiku, sonnet, or opus

# Messaging channels (optional)
# channels:
#   telegram:
#     bot_token: "your-bot-token"
#   whatsapp:
#     enabled: true

# Default delivery channel for `kyberbot notify` (heartbeat briefings, alerts,
# self-review pings). Skills should use `kyberbot notify "..."` rather than
# calling Telegram or WhatsApp directly. Falls back to the other channel if
# the preferred one is disconnected. Valid values: whatsapp | telegram.
# notification_channel: whatsapp

# GitHub backup (optional)
# backup:
#   enabled: true
#   remote_url: "git@github.com:user/agent-backup.git"
#   schedule: "4h"
#   branch: "main"

# Kybernesis cloud sync (optional)
# kybernesis:
#   agent_id: "your-agent-id"
#   workspace_id: "your-workspace-id"
